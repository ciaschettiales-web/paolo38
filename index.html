<!DOCTYPE html>
<html>
<head>
    <title>Verifica Patente</title>
</head>
<body>
    <h1>Verifica Patente</h1>
    
    <label>Nome:</label>
    <input type="text" id="nome">
    
    <label>Cognome:</label>
    <input type="text" id="cognome">
    
    <label>Età:</label>
    <input type="number" id="eta">
    
    <button onclick="verifica()">Verifica</button>
    
    <div id="risultato"></div>
    
    <script>
        function verifica() {
            var eta = parseInt(document.getElementById('eta').value);
            var risultato = document.getElementById('risultato');
            
            if (eta >= 18) {
                risultato.innerHTML = '<img src="patente_b.jpg" alt="Patente Tipo B">';
            } else if (eta >= 16) {
                risultato.innerHTML = '<img src="patente_a.jpg" alt="Patente Tipo A">';
            } else {
                risultato.innerHTML = 'riprova quando sarai più grande';
            }
        }
    </script>
</body>
</html>
